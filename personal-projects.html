<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Personal Projects — Emily Marais</title>
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Jost', sans-serif;
      background: #9b9eec;
      color: #fff;
    }

    /* ── Hero Section ───────────────────────────────────────────── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 24px 48px;
      background: #9b9eec;
      position: relative;
      overflow: hidden;
    }

    /* ── Background bars ─────────────────────────────────────────── */
    .hero__bars {
      position: absolute;
      top: 0;
      bottom: 0;
      left: -24px;
      right: -24px;
      display: flex;
      align-items: flex-end;
      gap: 16px;
      pointer-events: none;
      z-index: 0;
    }

    .hero__bar {
      flex: 1;
      border-radius: 14px 14px 0 0;
      min-width: 0;
    }

    .hero__bar:nth-child(1) { height: 38%; background: rgba(255, 14, 14, 0.03); }
    .hero__bar:nth-child(2) { height: 52%; background: rgba(255, 14, 14, 0.07); }
    .hero__bar:nth-child(3) { height: 42%; background: rgba(255, 14, 14, 0.10); }
    .hero__bar:nth-child(4) { height: 68%; background: rgba(255, 14, 14, 0.13); }
    .hero__bar:nth-child(5) { height: 100%; background: rgba(255, 14, 14, 0.16); }

    .hero > *:not(.hero__bars) {
      position: relative;
      z-index: 1;
    }

    .hero__heading {
      font-family: 'Manrope', sans-serif;
      font-size: 80px;
      font-weight: 700;
      color: #0C106D;
      line-height: 90%;
      letter-spacing: -0.04em;
      margin-bottom: 20px;
    }

    .hero__subheading {
      font-family: 'Jost', sans-serif;
      font-size: clamp(16px, 2.5vw, 22px);
      font-weight: 400;
      color: #1a1540;
      opacity: 0.75;
      margin-bottom: 40px;
      max-width: 520px;
    }

    .hero__arrow {
      font-size: 20px;
      color: #1a1540;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero__bars" aria-hidden="true">
      <div class="hero__bar"></div>
      <div class="hero__bar"></div>
      <div class="hero__bar"></div>
      <div class="hero__bar"></div>
      <div class="hero__bar"></div>
    </div>
    <h1 class="hero__heading">Personal projects</h1>
    <p class="hero__subheading">Designed by me. Executed with Claude Code.</p>
    <span class="hero__arrow" aria-hidden="true">↓</span>
  </section>

</body>
</html>
